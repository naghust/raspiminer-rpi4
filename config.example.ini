; raspiminer-rpi4 configuration.
; Copy this file to config.ini and edit it:   cp config.example.ini config.ini

[wallet]
; Seu endereço Bitcoin. Se ganhar um bloco, a recompensa é paga aqui.
; Your Bitcoin address. If you ever win a block, the reward is paid here.
; Use a bech32 (bc1...) address you control.
address = bc1qexampleexampleexampleexampleexampleexample

[pool]
; URL Stratum de uma pool SOLO (você fica com toda a recompensa se ganhar).
; Stratum URL of a SOLO pool (you keep the whole block reward if you win).
;   solo.ckpool.org:3333   - sem cadastro, taxa de 1% / no signup, 1% fee
;   public-pool.io:21496   - open source, sem taxa / zero fee, self-hostable
;   pool.nerdminers.org    - NAO funciona aqui: exige firmware NerdMiner/Bitaxe.
;                            Does NOT work here: whitelists NerdMiner/Bitaxe firmware.
url = stratum+tcp://solo.ckpool.org:3333
worker = RPi4
password = x

; Dificuldade de share a solicitar via mining.suggest_difficulty.
; Share difficulty to request from the pool via mining.suggest_difficulty.
; O Pi 4 (~2-6 MH/s) pode nao conseguir atingir a dificuldade padrao das pools
; (ckpool ~10000, public-pool ~100000). Valor 1 e o minimo aceito pelas pools.
; The Pi 4 (~2-6 MH/s) may not meet the pool default difficulty.
; 1 is the lowest a pool accepts. 0 = disable (use pool default).
suggest_difficulty = 1

; API de stats da pool para consultar o "best share difficulty".
; Pool stats API for "best share difficulty". {address} is substituted above.
;   ckpool:       https://solo.ckpool.org/users/{address}
;   public-pool:  http://SEU_IP:8081/api/client/{address}
stats_api = https://solo.ckpool.org/users/{address}
; one of: ckpool | public-pool | none
stats_api_type = ckpool

[miner]
; Caminho para o binario do cpuminer.
; Path to the cpuminer binary.
binary = /usr/local/bin/minerd
algo = sha256d
; Numero de threads. Pi 4 tem 4 nucleos — recomendado 2 para nao sobrecarregar.
; Number of threads. Pi 4 has 4 cores — 2 recommended to avoid overloading.
threads = 2
; Arquivo de log lido pelo monitor.sh para hashrate e shares ao vivo.
; Log file parsed by monitor.sh for live hashrate and shares.
log_file = /var/log/pizero-miner/cpuminer.log

[display]
; Cadencia de atualizacao do monitor.sh em segundos.
; monitor.sh refresh cadence in seconds.
refresh_seconds = 5

[network]
mempool_api = https://mempool.space/api
fiat = BRL             ; USD | BRL | none
poll_seconds = 120     ; intervalo de consulta das APIs / how often to query APIs
